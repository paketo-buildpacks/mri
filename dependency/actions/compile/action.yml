name: 'Compile Ruby on Target'
description: |
  Compiles Ruby

inputs:
  version:
    description: 'dependency version'
    required: true
  outputDir:
    description: 'output directory'
    required: true
  target:
    description: 'dependency OS target variant'
    required: true
  os:
    description: 'target OS'
    required: false
    default: 'linux'
  arch:
    description: 'target architecture'
    required: false
    default: 'amd64'

runs:
  using: 'composite'
  steps:

  - name: docker build
    id: docker-build
    env:
      SKIP_LOGIN: true
    uses: actions-hub/docker/cli@master
    with:
      args: "build --platform ${{ inputs.os }}/${{ inputs.arch }} -t compilation -f dependency/actions/compile/${{ inputs.target }}.Dockerfile dependency/actions/compile"

  - name: docker run
    id: docker-run
    uses: actions-hub/docker/cli@master
    env:
      SKIP_LOGIN: true
    with:
      args: "run --platform ${{ inputs.os }}/${{ inputs.arch }} -v ${{ inputs.outputDir }}:/home compilation --version ${{ inputs.version }} --outputDir /home --target ${{ inputs.target }} --os ${{ inputs.os }} --arch ${{ inputs.arch }}"

  - name: print contents of output dir
    shell: bash
    run: ls -lah ${{ inputs.outputDir }}
